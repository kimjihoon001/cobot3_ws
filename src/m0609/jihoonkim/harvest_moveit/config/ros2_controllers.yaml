# ros2_control — Isaac topic_based 하드웨어 위의 컨트롤러들.
# update_rate 는 Isaac 물리 60fps 와 맞춘다.
/harvester_moveit/controller_manager:
  ros__parameters:
    update_rate: 60

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/JointGroupPositionController

/harvester_moveit/arm_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 60.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0

# 그리퍼 — finger_joint 위치를 /gripper_controller/commands (Float64MultiArray) 로 직접 지령.
# MoveIt 이 관리하지 않는다(moveit_controllers.yaml 에 없음) — grasp 스크립트가 직접 명령.
/harvester_moveit/gripper_controller:
  ros__parameters:
    joints:
      - finger_joint
