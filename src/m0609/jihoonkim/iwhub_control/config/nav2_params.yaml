# iw.hub Nav2 파라미터 (ROS2 Humble). 위치추정 = AMCL(정적 맵 + 라이다 매칭).
#   맵 = maps/greenhouse.yaml (IW 전용, Isaac 월드 좌표에 정렬).
# ★ Nova Carter 규칙 스캔 2기: /front_2d_lidar/scan + /back_2d_lidar/scan.
#   AMCL 은 전방 스캔 1개로 맵 매칭, 코스트맵은 둘 다 사용한다.
# TF: map(amcl)→odom(base_node)→base_link→laser_front/back(Isaac).

amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "iwhub_0/base_link"
    odom_frame_id: "iwhub_0/odom"
    global_frame_id: "iwhub_0/map"
    scan_topic: front_2d_lidar/scan
    # IW 전용 맵은 Isaac 월드 좌표에 정렬되어 있다.
    set_initial_pose: true
    initial_pose: {x: 2.0, y: -12.0, z: 0.0, yaw: 0.0}
    laser_model_type: "likelihood_field"
    max_beams: 180
    min_particles: 800
    max_particles: 3000
    # 실제 코스트맵 관측 범위와 맞춰 멀리서 들어온 노이즈의 영향을 줄인다.
    laser_max_range: 25.0
    laser_min_range: 0.05                   # Nova Carter RPLIDAR S2E 프로파일
    # 바퀴 odom의 누적 회전/직진 오차가 코스트맵에 쌓이기 전에 자주 보정한다.
    update_min_a: 0.05
    update_min_d: 0.05
    resample_interval: 1
    transform_tolerance: 1.0
    # 충돌·헛돌기가 있는 시뮬 차체의 엔코더 odom을 과신하지 않도록
    # 이동 노이즈를 높이고, 정적맵과 맞는 라이다 점에 더 큰 가중치를 준다.
    alpha1: 0.35
    alpha2: 0.35
    alpha3: 0.30
    alpha4: 0.30
    z_hit: 0.80
    z_rand: 0.20
    sigma_hit: 0.12
    do_beamskip: true
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9
    tf_broadcast: true

map_server:
  ros__parameters:
    use_sim_time: true
    frame_id: "iwhub_0/map"
    yaml_filename: ""                       # launch 에서 map 인자로 채움

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: iwhub_0/map
    robot_base_frame: iwhub_0/base_link
    odom_topic: odom
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true
    FollowPath:
      # IW는 차동구동이지만 적재 상태에서 제자리 회전 마찰이 크다. 방향을 먼저 맞추는
      # RotationShim/DWB 대신 Smac의 곡률 경로를 그대로 추종해 전·후진 원호로 회전한다.
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.30
      lookahead_dist: 0.60
      min_lookahead_dist: 0.30
      max_lookahead_dist: 0.90
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.60
      use_collision_detection: true
      # 실제 접촉 전 너무 일찍 멈추지 않도록 전방 충돌 예측 시간을 절반으로 축소한다.
      max_allowed_time_to_collision_up_to_carrot: 0.35
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.80
      regulated_linear_scaling_min_speed: 0.08
      use_cost_regulated_linear_velocity_scaling: true
      # 베드 주변 비용 감속 구간을 더 좁게 제한한다.
      cost_scaling_dist: 0.15
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 12.0
      # 제자리 회전과 정상 경로 후진을 사용하지 않는다. 시작점 남쪽 벽 가까이에서
      # 후진 원호를 택하면 긴 뒤 모서리가 벽에 닿으므로 전진 U턴만 따라간다.
      use_rotate_to_heading: false
      allow_reversing: false
      max_angular_accel: 0.8
      transform_tolerance: 0.2

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 10.0
      publish_frequency: 5.0
      # 로컬 제어는 연속적인 odom 기준으로 계산해 AMCL(map→odom) 보정 점프가
      # 즉시 조향 명령을 흔들지 않게 한다. 정적맵은 global_costmap에서 사용한다.
      global_frame: iwhub_0/odom
      robot_base_frame: iwhub_0/base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # 적재 주행의 실제 최대 폭은 IW 차체(0.659m)가 아니라 EUR 팔레트(0.802m)다.
      # 회전할 때 팔레트 모서리가 베드에 걸리지 않도록 길이 1.50m × 폭 0.802m의
      # 전체 적재 외곽을 충돌 footprint로 사용한다.
      footprint: "[[0.75, 0.401], [0.75, -0.401], [-0.75, -0.401], [-0.75, 0.401]]"
      # 추가 외곽 여유를 제거하고 실측 footprint만 충돌 검사에 사용한다.
      footprint_padding: 0.0
      # 중앙 측면은 두 라이다 모두 최소 감지거리 안쪽이 될 수 있다. 정적 벽이 스캔에서
      # 사라져도 ObstacleFootprint가 계속 검사하도록 static layer를 로컬에도 유지한다.
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan_front scan_back
        scan_front:
          topic: front_2d_lidar/scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          obstacle_max_range: 20.0
          raytrace_max_range: 25.0
        scan_back:
          topic: back_2d_lidar/scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          obstacle_max_range: 20.0
          raytrace_max_range: 25.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # MM의 설정 논리를 IW 반폭(0.42m)에 적용한 값. 기존 0.1m는 차체 모서리
        # 회전 여유를 전혀 만들지 못했다.
        # 비용 띠는 기존처럼 얇게 유지하고, 실제 접촉 여부는 위 팔레트 footprint의
        # 다각형 충돌 검사로 판정한다.
        cost_scaling_factor: 12.0
        inflation_radius: 0.15

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: iwhub_0/map
      robot_base_frame: iwhub_0/base_link
      # local_costmap과 동일한 1.50×0.802m 팔레트 적재 footprint.
      footprint: "[[0.75, 0.401], [0.75, -0.401], [-0.75, -0.401], [-0.75, 0.401]]"
      footprint_padding: 0.0
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan_front scan_back
        scan_front:
          topic: front_2d_lidar/scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 20.0
          raytrace_max_range: 25.0
        scan_back:
          topic: back_2d_lidar/scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 20.0
          raytrace_max_range: 25.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 12.0
        inflation_radius: 0.15

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      # NavFn의 중심점 경로는 긴 직사각형의 회전 자세를 고려하지 않는다. Hybrid-A*로
      # footprint와 방향을 함께 검사하고 최소 0.8m 반경의 전진 원호를 생성한다.
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.25
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: -1
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.5
      minimum_turning_radius: 0.80
      change_penalty: 0.2
      non_straight_penalty: 1.2
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      smooth_path: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    # Humble 기본 BT는 활성화할 때 spin action server의 존재를 요구한다. 서버는 등록하되
    # 정상 경로 추종은 Smac+PurePursuit 원호 주행이며, spin은 BT 복구 단계에서만 저속 사용한다.
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: iwhub_0/odom
    robot_base_frame: iwhub_0/base_link
    transform_tolerance: 0.1
    cycle_frequency: 10.0
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.25
    min_rotational_vel: 0.05
    rotational_acc_lim: 0.4

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.35, 0.0, 0.45]
    min_velocity: [-0.15, 0.0, -0.45]
    max_accel: [0.7, 0.0, 0.8]
    max_decel: [-0.9, 0.0, -1.0]
    odom_topic: "odom"
    odom_duration: 0.1
