# iw.hub Nav2 파라미터 — odom-only 모드 (맵/AMCL 없음. 반복 온실의 aliasing 회피).
#   시뮬 odom 은 슬립이 없어 거의 정확 → 전역 맵 없이 롤링 코스트맵 + odom 으로 주행.
#   global_frame = odom, static_layer 없음. 스캔 2기로 장애물 회피. use_sim_time = true.
#   TF: odom(base_node)→base_link→laser_front/back(Isaac). map 프레임 안 씀.

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      min_vel_x: 0.0
      max_vel_x: 0.5
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      min_speed_theta: 0.0
      acc_lim_x: 2.5
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_theta: -3.2
      vx_samples: 20
      vtheta_samples: 20
      sim_time: 1.7
      transform_tolerance: 0.2
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign",
                "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      GoalAlign.scale: 24.0
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # ★ 로봇 크기는 URDF 가 없어 TF 로 안 알려진다 — Nav2 는 오직 이 footprint 로만 안다.
      #   적재 상태 실측 크기: iw.hub 몸체 1.431×0.659 + 데크 팔레트 1.2×0.8 → 합산 1.5×0.84m.
      #   base_link(로봇 중심) 기준 반치수 ±0.75(길이,x) × ±0.42(폭,y). robot_radius 로는
      #   팔레트 오버행을 못 담아 좁은 길로 계획→처박음(2026-07-21 사용자 지적).
      footprint: "[[0.75, 0.42], [0.75, -0.42], [-0.75, -0.42], [-0.75, 0.42]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan_front scan_back
        scan_front:
          topic: /scan_front
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 20.0
          raytrace_max_range: 25.0
        scan_back:
          topic: /scan_back
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 20.0
          raytrace_max_range: 25.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.2

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true          # 맵 없음 → 로봇 중심 롤링 창으로 계획
      width: 40
      height: 40
      resolution: 0.05
      # ★ 로봇 크기는 URDF 가 없어 TF 로 안 알려진다 — Nav2 는 오직 이 footprint 로만 안다.
      #   적재 상태 실측 크기: iw.hub 몸체 1.431×0.659 + 데크 팔레트 1.2×0.8 → 합산 1.5×0.84m.
      #   base_link(로봇 중심) 기준 반치수 ±0.75(길이,x) × ±0.42(폭,y). robot_radius 로는
      #   팔레트 오버행을 못 담아 좁은 길로 계획→처박음(2026-07-21 사용자 지적).
      footprint: "[[0.75, 0.42], [0.75, -0.42], [-0.75, -0.42], [-0.75, 0.42]]"
      track_unknown_space: false    # 미탐색을 free 로 → 롤링 창 내 계획 가능
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan_front scan_back
        scan_front:
          topic: /scan_front
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 20.0
          raytrace_max_range: 25.0
        scan_back:
          topic: /scan_back
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 20.0
          raytrace_max_range: 25.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.2

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.0]
    min_velocity: [-0.5, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "/odom"
    odom_duration: 0.1
