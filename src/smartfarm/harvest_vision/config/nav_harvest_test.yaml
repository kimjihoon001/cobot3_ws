manipulator_target_node:
  ros__parameters:
    command_enabled: true
    auto_grasp_enabled: true
    external_harvest_gate_enabled: true
    # 시뮬 통합시험: YOLO가 선택한 과실을 Isaac ground-truth 좌표에 매칭한다.
    # 실기에서는 false로 두고 비전 3D 좌표만 사용한다.
    use_sim_ground_truth: true
    # 카메라 검출 광선과 GT 과실 중심 사이 허용 횡거리.
    sim_match_radius_m: 0.12
    # 모바일 매니퓰레이터 RMPflow는 자세에 따라 10초를 넘길 수 있어 단계별 여유를 둔다.
    motion_timeout_sec: 30.0

nav_harvest_test_node:
  ros__parameters:
    nav_status_topic: /navigate_to_pose/_action/status
    harvest_enable_topic: /harvest_test/enable
    manipulator_state_topic: /harvester_0/manipulator/target_state
    mobility_ready_topic: /harvester_0/manipulator/mobility_ready
    basket_pose_topic: /iw/basket/empty_slot_pose
    basket_frame: base_link
    # IW가 없을 때만 쓰는 tool0 release pose [x,y,z] in basket_frame.
    mock_basket_release_xyz: [0.45, -0.35, 0.45]
    # 디버깅 중 confidence/모델을 조절해도 게이트가 먼저 닫히지 않게 충분히 둔다.
    search_timeout_sec: 300.0
    # 통합시험 노드를 로봇 도착 후 켜도 마지막 SUCCEEDED 목표에서 수확을 이어간다.
    accept_initial_succeeded_goal: true
