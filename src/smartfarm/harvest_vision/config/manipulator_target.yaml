manipulator_target_node:
  ros__parameters:
    input_topic: /vision/approach_target
    validated_topic: /harvester_0/manipulator/validated_target
    output_topic: /harvester_0/manipulator/target_pose
    isaac_command_topic: /harvester_0/cmd
    target_class_topic: /vision/target_class
    state_topic: /harvester_0/manipulator/target_state
    rmp_status_topic: /harvester_0/rmpflow/status
    basket_pose_topic: /iw/basket/empty_slot_pose
    harvest_enable_topic: /harvest_test/enable
    external_harvest_gate_enabled: false
    mobility_ready_topic: /harvester_0/manipulator/mobility_ready
    # fleet_dispatch/harvester_nav2.launch.py 기본 namespace가 비어 있으므로 TF도 base_link다.
    base_frame: base_link

    # 캘리브레이션과 dry-run 확인 전에는 절대로 true로 바꾸지 않는다.
    command_enabled: false
    max_target_age_sec: 0.5
    tf_timeout_sec: 0.2
    max_jump_m: 0.5
    auto_grasp_enabled: true
    pregrasp_clearance_m: 0.15
    tool_grasp_reach_m: 0.115
    motion_timeout_sec: 10.0
    # 닫기 후 양쪽 손가락이 같은 토마토에 접촉하면 Isaac에서 30N 예압으로
    # 전환하고 0.5초 연속 유지한 뒤에만 꽃자루 FixedJoint를 해제한다.
    gripper_close_settle_sec: 1.0
    grasp_tcp_max_distance_m: 0.09
    grasp_verify_retract_m: 0.03
    grasp_follow_max_delta_m: 0.015
    # 한쪽 손가락만 접촉하면 닿은 방향으로 손목을 5도 보정해 한 번 재파지한다.
    grasp_one_side_yaw_deg: 5.0
    grasp_one_side_max_retries: 1
    # IW(바스켓) 없으면 파지한 채 홈으로 복귀(그리퍼 안 엶). True 라 RETRACT→_send_home.
    home_after_attempt: true
    basket_approach_height_m: 0.15
    basket_workspace_min: [-0.80, -0.80, 0.15]
    basket_workspace_max: [1.25, 0.80, 1.80]

    # base_frame 기준 허용 작업영역 [x, y, z] (m). 실제 로봇/환경에 맞춰 축소한다.
    # 팔을 대각선으로 완전히 펴는 자세도 허용한다. 최종 안전 한계는 별도의
    # workspace_max_xy_radius_m=1.40으로 제한한다.
    workspace_min: [0.15, -1.05, 0.15]
    workspace_max: [1.25, 1.05, 1.80]
