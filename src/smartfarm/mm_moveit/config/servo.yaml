###############################################
# UR10e 수확 MM — MoveIt Servo 미세 시각 보정
###############################################
use_gazebo: false
command_in_type: "speed_units"
scale:
  linear: 0.08
  rotational: 0.20
  joint: 0.10

publish_period: 0.02
low_latency_mode: false
command_out_type: trajectory_msgs/JointTrajectory
publish_joint_positions: true
publish_joint_velocities: false
publish_joint_accelerations: false
smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"
is_primary_planning_scene_monitor: false

move_group_name: mm_manipulator
planning_frame: mm_base
ee_frame_name: harvest_tcp
robot_link_command_frame: mm_base

incoming_command_timeout: 0.10
num_outgoing_halt_msgs_to_publish: 5
lower_singularity_threshold: 17.0
hard_stop_singularity_threshold: 30.0
leaving_singularity_threshold_multiplier: 2.0
joint_limit_margin: 0.10

cartesian_command_in_topic: ~/delta_twist_cmds
joint_command_in_topic: ~/delta_joint_cmds
joint_topic: joint_states
status_topic: ~/status
command_out_topic: arm_controller/joint_trajectory

check_collisions: true
collision_check_rate: 20.0
collision_check_type: threshold_distance
self_collision_proximity_threshold: 0.015
scene_collision_proximity_threshold: 0.025
collision_distance_safety_factor: 1000.0
min_allowable_collision_distance: 0.01
